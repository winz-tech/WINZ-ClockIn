<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --winz-red:#E30613; --red-dark:#8f0009; --bg:#0a0a0c; --panel:#15151a;
           --line:rgba(255,255,255,.08); --gray:#8a8a92;
           --en:'Chakra Petch',sans-serif; }
    *{ box-sizing:border-box; margin:0; padding:0; font-family:"Microsoft JhengHei",sans-serif; }
    body{ background:var(--bg); }
    #app-wrap{ width:390px; margin:0 auto; min-height:100vh; position:relative; }
    .wz-stickyhead{ position:sticky; top:0; z-index:100; }
    #app{ padding:14px 14px 40px; position:relative; z-index:2; }

    /* ===== 背景網格 + 斜切紅光 ===== */
    .bg-grid{ position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:linear-gradient(var(--line) 1px,transparent 1px),
                       linear-gradient(90deg,var(--line) 1px,transparent 1px);
      background-size:44px 44px;
      mask-image:radial-gradient(ellipse 100% 70% at 50% 35%, #000 20%, transparent 80%);
      -webkit-mask-image:radial-gradient(ellipse 100% 70% at 50% 35%, #000 20%, transparent 80%); }
    .slash{ position:fixed; z-index:0; pointer-events:none;
      width:200vmax; height:2px; left:50%; top:42%;
      transform:translate(-50%,-50%) rotate(-18deg);
      background:linear-gradient(90deg,transparent,var(--winz-red),transparent);
      opacity:.5; animation:slashPulse 3s ease-in-out infinite; }
    @keyframes slashPulse{ 0%,100%{opacity:.25} 50%{opacity:.7} }

    /* ===== 功能列（漢堡 + 頁名 + 時鐘）===== */
    .fnbar{ display:flex; align-items:center; gap:10px;
      background:linear-gradient(90deg,#141418,#1c1c22);
      border-bottom:1px solid rgba(227,6,19,.4); padding:8px 12px; }
    .fnbar .pgname{ font-family:var(--en); font-weight:700; font-size:11px;
      letter-spacing:3px; color:var(--winz-red); text-transform:uppercase; }
    .fnbar .clock{ margin-left:auto; font-family:var(--en); font-weight:600;
      font-size:13px; letter-spacing:2px; color:#fff; }
    .hamb{ width:34px; height:30px; background:transparent; border:1px solid rgba(255,255,255,.25);
      border-radius:6px; cursor:pointer; display:flex; flex-direction:column;
      justify-content:center; align-items:center; gap:4px; }
    .hamb span{ display:block; width:16px; height:2px; background:#fff; }
    .hamb span:nth-child(2){ background:var(--winz-red); }

    /* ===== 抽屜選單 ===== */
    .drawer-mask{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200;
      opacity:0; pointer-events:none; transition:opacity .2s; }
    .drawer{ position:fixed; top:0; right:-280px; width:270px; height:100vh; z-index:201;
      background:var(--panel); border-left:2px solid var(--winz-red);
      box-shadow:-8px 0 30px rgba(0,0,0,.6); transition:right .25s; padding:18px 0; }
    body.menu-open .drawer-mask{ opacity:1; pointer-events:auto; }
    body.menu-open .drawer{ right:0; }
    .drawer .dr-title{ font-family:var(--en); font-weight:700; font-size:11px;
      letter-spacing:4px; color:var(--gray); text-transform:uppercase;
      padding:0 20px 12px; border-bottom:1px solid var(--line); }
    .dr-item{ display:flex; align-items:center; gap:12px; width:100%;
      background:transparent; border:none; cursor:pointer; text-align:left;
      padding:15px 20px; color:#fff; font-size:16px; font-weight:bold;
      border-bottom:1px solid var(--line); }
    .dr-item .mk{ width:4px; height:18px; background:var(--winz-red);
      transform:skewX(-18deg); flex:none; }
    .dr-item.now{ background:rgba(227,6,19,.14); }
    .dr-item.soon{ color:#555; cursor:default; }
    .dr-item.soon .mk{ background:#444; }
    .dr-item .tag{ margin-left:auto; font-family:var(--en); font-size:9px;
      letter-spacing:1px; color:#666; border:1px solid #3a3a3a;
      padding:2px 6px; border-radius:4px; }

    /* ===== 今日狀態卡（HUD 面板）===== */
    .card{ position:relative; background:var(--panel); border:1px solid var(--line);
      border-radius:10px; padding:16px; margin-bottom:18px; }
    .card::before, .card::after{ content:''; position:absolute; width:14px; height:14px;
      border:2px solid var(--winz-red); }
    .card::before{ top:-2px; left:-2px; border-right:none; border-bottom:none; }
    .card::after{ bottom:-2px; right:-2px; border-left:none; border-top:none; }
    .tc-date{ font-family:var(--en); font-size:12px; letter-spacing:2px; color:var(--gray); }
    .tc-name{ font-size:20px; font-weight:bold; color:#fff; margin:2px 0 12px; }
    .tc-row{ display:flex; gap:10px; }
    .tc-cell{ flex:1; background:#0e0e12; border:1px solid var(--line);
      border-radius:8px; padding:12px 8px; text-align:center; }
    .tc-lab{ font-family:var(--en); font-size:10px; letter-spacing:2px; color:var(--gray);
      margin-bottom:3px; text-transform:uppercase; }
    .tc-time{ font-family:var(--en); font-weight:700; font-size:22px;
      color:#3a3a42; letter-spacing:1px; }
    .tc-cell.done{ border-color:rgba(227,6,19,.5); }
    .tc-cell.done .tc-time{ color:var(--winz-red); text-shadow:0 0 12px rgba(227,6,19,.6); }

    /* ===== 斜切大按鈕 ===== */
    .punch-btn{ display:block; width:92%; margin:0 auto 16px; height:92px;
      border:none; cursor:pointer; transform:skewX(-18deg); border-radius:8px;
      position:relative; transition:transform .1s, box-shadow .1s; }
    .punch-btn::before{ content:''; position:absolute; inset:4px;
      border:1px solid rgba(255,255,255,.3); border-radius:5px; pointer-events:none; }
    .punch-btn .inner{ transform:skewX(18deg); display:flex; flex-direction:column;
      align-items:center; justify-content:center; height:100%; gap:2px; }
    .punch-btn .zh{ color:#fff; font-size:24px; font-weight:bold; letter-spacing:8px; margin-right:-8px; }
    .punch-btn .en{ font-family:var(--en); font-weight:600; font-size:10px;
      letter-spacing:4px; color:rgba(255,255,255,.65); text-transform:uppercase; }
    .punch-btn.in{ background:linear-gradient(135deg,var(--winz-red),var(--red-dark));
      box-shadow:0 0 22px rgba(227,6,19,.45), 0 6px 0 rgba(0,0,0,.5); }
    .punch-btn.out{ background:linear-gradient(135deg,#34343c,#17171b);
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 0 14px rgba(0,0,0,.6), 0 6px 0 rgba(0,0,0,.5); }
    .punch-btn:active{ transform:skewX(-18deg) translateY(3px); }
    .punch-btn:disabled{ opacity:.45; }

    .hint{ text-align:center; font-family:var(--en); font-size:10px; letter-spacing:2px;
      color:#55555e; line-height:1.8; margin-top:8px; text-transform:uppercase; }

    /* ===== Loading / Toast ===== */
    .loading-mask{ position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:999;
      display:none; align-items:center; justify-content:center; }
    .loading-box{ background:var(--panel); border:1px solid rgba(227,6,19,.4);
      border-radius:10px; padding:20px 30px; text-align:center; font-size:15px; color:#fff; }
    .spinner{ width:32px; height:32px; border:3px solid #2a2a30; border-top-color:var(--winz-red);
      border-radius:50%; margin:0 auto 10px; animation:spin .8s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .toast{ position:fixed; left:50%; bottom:80px; transform:translateX(-50%);
      background:rgba(20,20,24,.95); border:1px solid rgba(255,255,255,.15); color:#fff;
      padding:10px 18px; border-radius:8px; font-size:14px; opacity:0; pointer-events:none;
      transition:opacity .25s; z-index:1000; max-width:86%; text-align:center; }
    .toast.show{ opacity:1; }
    .toast.error{ border-color:var(--winz-red); box-shadow:0 0 14px rgba(227,6,19,.4); }
    .toast.success{ border-color:#2e9e44; box-shadow:0 0 14px rgba(46,158,68,.4); }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="slash"></div>

<div id="app-wrap">
  <div class="wz-stickyhead">
    <?!= include('01-topbar'); ?>
    <div class="fnbar">
      <button class="hamb" onclick="toggleMenu(true)" aria-label="功能選單">
        <span></span><span></span><span></span>
      </button>
      <div class="pgname">// Time Attendance</div>
      <div class="clock" id="hudClock">--:--:--</div>
    </div>
  </div>

  <div id="app">
    <!-- 今日狀態卡 -->
    <div class="card">
      <div class="tc-date" id="tcDate">—</div>
      <div class="tc-name" id="tcName">載入中...</div>
      <div class="tc-row">
        <div class="tc-cell" id="cellIn">
          <div class="tc-lab">Clock In · 上班</div>
          <div class="tc-time" id="tcIn">--:--:--</div>
        </div>
        <div class="tc-cell" id="cellOut">
          <div class="tc-lab">Clock Out · 下班</div>
          <div class="tc-time" id="tcOut">--:--:--</div>
        </div>
      </div>
    </div>

    <!-- 大按鈕 -->
    <button id="btnIn" class="punch-btn in" onclick="doPunch('上班')">
      <span class="inner"><span class="zh">上班打卡</span><span class="en">// Clock In //</span></span>
    </button>
    <button id="btnOut" class="punch-btn out" onclick="doPunch('下班')">
      <span class="inner"><span class="zh">下班打卡</span><span class="en">// Clock Out //</span></span>
    </button>

    <div class="hint">GPS Fence 150m // Server Time Sync<br>打卡需開啟定位權限</div>
  </div>
</div>

<!-- 抽屜選單 -->
<div class="drawer-mask" onclick="toggleMenu(false)"></div>
<div class="drawer">
  <div class="dr-title">// WINZ HR Suite</div>
  <button class="dr-item now"><span class="mk"></span>打卡系統</button>
  <button class="dr-item" onclick="go('leave')"><span class="mk"></span>請假系統</button>
  <button class="dr-item soon"><span class="mk"></span>補打卡申請<span class="tag">SOON</span></button>
  <button class="dr-item soon"><span class="mk"></span>加班申請<span class="tag">SOON</span></button>
  <button class="dr-item soon"><span class="mk"></span>薪資單<span class="tag">SOON</span></button>
</div>

<div id="loading" class="loading-mask">
  <div class="loading-box"><div class="spinner"></div><div id="loadingTxt">處理中...</div></div>
</div>
<div id="toast" class="toast"></div>

<script>
  var BASE_URL = '<?= ScriptApp.getService().getUrl() ?>';

  // ===== 抽屜 / 導頁 =====
  function toggleMenu(open) { document.body.classList.toggle('menu-open', open); }
  function go(page) { window.top.location.href = BASE_URL + '?page=' + page; }

  // ===== 右上角即時時鐘 =====
  function tick() {
    var d = new Date(), p = function(n){ return (n<10?'0':'')+n; };
    document.getElementById('hudClock').textContent =
      p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
  }
  tick(); setInterval(tick, 1000);

  // ===== Loading / Toast =====
  function showLoading(t) {
    document.getElementById('loadingTxt').textContent = t || '處理中...';
    document.getElementById('loading').style.display = 'flex';
  }
  function hideLoading() { document.getElementById('loading').style.display = 'none'; }
  var _toastTimer = null;
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (type || '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { el.className = 'toast'; }, 3200);
  }

  // ===== 今日狀態 =====
  function refreshToday() {
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || '讀取今日狀態失敗', 'error'); return;
        }
        document.getElementById('tcDate').textContent = res.date;
        document.getElementById('tcName').textContent = res.name || '';
        _setTime('cellIn', 'tcIn', res.punchIn);
        _setTime('cellOut', 'tcOut', res.punchOut);
      })
      .withFailureHandler(function(e) { showToast('讀取失敗：' + e.message, 'error'); })
      .getTodayPunch();
  }
  function _setTime(cellId, timeId, v) {
    document.getElementById(timeId).textContent = v || '--:--:--';
    document.getElementById(cellId).className = 'tc-cell' + (v ? ' done' : '');
  }

  // ===== 打卡（定案版）=====
  function doPunch(punchType) {
    var btn = document.getElementById(punchType === '上班' ? 'btnIn' : 'btnOut');
    btn.disabled = true;
    showLoading('定位中...');
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        showLoading('打卡中...');
        google.script.run
          .withSuccessHandler(function(res) {
            hideLoading(); btn.disabled = false;
            if (!res.success) { showToast(res.message, 'error'); return; }
            showToast(res.message, 'success');
            refreshToday();
          })
          .withFailureHandler(function(e) { hideLoading(); btn.disabled = false; showToast('打卡失敗：' + e.message, 'error'); })
          .punchCard(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy, punchType);
      },
      function(err) {
        hideLoading(); btn.disabled = false;
        showToast(err.code === 1 ? '請允許定位權限' : '定位失敗，請到窗邊或戶外重試', 'error');
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  // ===== 版本檢查（01-topbar 已內建就刪這段）=====
  var MY_VERSION = '';
  function checkVersion() {
    google.script.run.withSuccessHandler(function(v) {
      if (!MY_VERSION) { MY_VERSION = v; return; }
      if (v && v !== MY_VERSION) location.reload();
    }).getAppVersion();
  }
  setInterval(checkVersion, 60000);

  window.addEventListener('load', function() {
    refreshToday();
    checkVersion();
  });
</script>
</body>
</html>
