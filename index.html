<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>穎利科技｜打卡系統</title>
<meta name="description" content="穎利科技考勤薪資系統">
<meta property="og:title" content="穎利科技｜考勤薪資系統">
<meta property="og:description" content="WINZ 考勤薪資系統：GPS 定位打卡・出勤查詢">
<meta property="og:image" content="https://winz-tech.github.io/WINZ-ClockIn/icon-512.png">
<meta property="og:url" content="https://winz-tech.github.io/WINZ-ClockIn/">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="考勤薪資">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
<style>
:root{
--red:      #E30613;
--red-dark: #8f0009;
--bg:       #0a0a0c;
--panel:    #121216;
--white:    #ffffff;
--gray:     #6a6a72;
--line:     rgba(255,255,255,.08);
--en: 'Chakra Petch', sans-serif;
--tc: 'Noto Sans TC', sans-serif;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
background:var(--bg);
color:var(--white);
font-family:var(--tc);
overflow:hidden;
display:flex; align-items:center; justify-content:center;
}
.bg-grid{
position:fixed; inset:0; z-index:0;
background-image:
linear-gradient(var(--line) 1px, transparent 1px),
linear-gradient(90deg, var(--line) 1px, transparent 1px);
background-size:56px 56px;
mask-image:radial-gradient(ellipse 90% 80% at 50% 45%, #000 30%, transparent 75%);
-webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 45%, #000 30%, transparent 75%);
}
.slash{
position:fixed; z-index:1; pointer-events:none;
width:180vmax; height:22vmin; left:50%; top:50%;
transform:translate(-50%,-50%) rotate(-18deg);
background:linear-gradient(90deg, transparent, rgba(227,6,19,.12) 30%, rgba(227,6,19,.2) 50%, rgba(227,6,19,.12) 70%, transparent);
border-top:1px solid rgba(227,6,19,.35);
border-bottom:1px solid rgba(227,6,19,.35);
}
.slash.s2{
height:3px; border:none; opacity:.8;
background:linear-gradient(90deg, transparent, var(--red), transparent);
animation:slashPulse 3s ease-in-out infinite;
}
@keyframes slashPulse{ 0%,100%{opacity:.35} 50%{opacity:.9} }
.sweep{
position:fixed; inset:0; z-index:1; pointer-events:none;
background:linear-gradient(180deg, transparent 0%, rgba(227,6,19,.06) 50%, transparent 100%);
background-size:100% 300px; background-repeat:no-repeat;
animation:sweep 5s linear infinite;
}
@keyframes sweep{ from{background-position:0 -300px} to{background-position:0 110vh} }
.hud{ position:fixed; z-index:2; font-family:var(--en); font-size:10px;
letter-spacing:2px; color:var(--gray); text-transform:uppercase; }
.hud b{ color:var(--red); font-weight:700; }
.hud.tl{ top:22px; left:26px; }
.hud.tr{ top:22px; right:26px; text-align:right; }
.hud.bl{ bottom:22px; left:26px; }
.hud.br{ bottom:22px; right:26px; text-align:right; }
.corner{ position:fixed; width:26px; height:26px; z-index:2;
border:2px solid var(--red); opacity:.8; }
.corner.tl{ top:12px; left:12px;  border-right:none; border-bottom:none; }
.corner.tr{ top:12px; right:12px; border-left:none;  border-bottom:none; }
.corner.bl{ bottom:12px; left:12px;  border-right:none; border-top:none; }
.corner.br{ bottom:12px; right:12px; border-left:none;  border-top:none; }
.stage{
position:relative; z-index:10; text-align:center;
width:100%; max-width:640px; padding:24px;
display:flex; flex-direction:column; align-items:center; gap:0;
}
.brand{
font-family:var(--en); font-weight:600; font-size:13px;
letter-spacing:8px; color:var(--gray); text-transform:uppercase;
opacity:0; animation:rise .5s .1s forwards;
}
.brand b{ color:var(--red); }
.logo{
height:64px; max-width:82vw; object-fit:contain;
margin-bottom:14px;
filter:drop-shadow(0 0 14px rgba(227,6,19,.5));
opacity:0; animation:rise .5s .05s forwards;
}
@media (max-width:480px){ .logo{ height:48px; } }
.title{
position:relative; margin:10px 0 4px;
font-weight:900; font-size:clamp(58px, 14vw, 96px);
letter-spacing:14px; margin-right:-14px; line-height:1.1;
opacity:0; animation:rise .5s .25s forwards;
}
.title .t{ position:relative; display:inline-block; }
.title .t::before, .title .t::after{
content:attr(data-txt); position:absolute; inset:0; opacity:0;
}
.title .t::before{ color:var(--red); }
.title .t::after{ color:#2bd9ff; }
.stage:hover .title .t::before, body.launching .title .t::before{
opacity:.85; animation:glitchA .35s steps(2) infinite;
}
.stage:hover .title .t::after, body.launching .title .t::after{
opacity:.85; animation:glitchB .35s steps(2) infinite;
}
@keyframes glitchA{ 0%{transform:translate(-3px,2px)} 50%{transform:translate(2px,-1px)} 100%{transform:translate(-1px,1px)} }
@keyframes glitchB{ 0%{transform:translate(3px,-2px)} 50%{transform:translate(-2px,1px)} 100%{transform:translate(1px,-2px)} }
.subtitle{
font-family:var(--en); font-weight:700; font-size:14px;
letter-spacing:10px; color:var(--red); text-transform:uppercase;
text-shadow:0 0 12px rgba(227,6,19,.7);
opacity:0; animation:rise .5s .4s forwards;
}
.divider{
width:220px; height:3px; margin:34px 0 26px;
background:repeating-linear-gradient(-45deg, var(--red) 0 8px, transparent 8px 16px);
opacity:0; animation:rise .5s .5s forwards;
}
.bootlog{
font-family:var(--en); font-size:11px; letter-spacing:2px;
color:var(--gray); text-align:left; min-height:54px;
text-transform:uppercase;
opacity:0; animation:rise .5s .6s forwards;
}
.bootlog div{ opacity:0; }
.bootlog .ok{ color:var(--red); font-weight:700; }
.enter{
margin-top:30px;
transform:skewX(-18deg);
background:linear-gradient(135deg, var(--red), var(--red-dark));
border:none; cursor:pointer;
padding:0; position:relative;
box-shadow:0 0 24px rgba(227,6,19,.45), 0 8px 0 rgba(0,0,0,.5);
opacity:0; animation:rise .5s .75s forwards;
transition:transform .12s, box-shadow .12s;
}
.enter:hover{ transform:skewX(-18deg) translateY(-2px); box-shadow:0 0 40px rgba(227,6,19,.8), 0 10px 0 rgba(0,0,0,.5); }
.enter:active{ transform:skewX(-18deg) translateY(2px); box-shadow:0 0 16px rgba(227,6,19,.5), 0 4px 0 rgba(0,0,0,.5); }
.enter::before{
content:''; position:absolute; inset:3px;
border:1px solid rgba(255,255,255,.35); pointer-events:none;
}
.enter .lab{
display:block; transform:skewX(18deg);
padding:18px 64px;
font-family:var(--tc); font-weight:900; font-size:22px;
letter-spacing:10px; margin-right:-10px; color:#fff;
}
.enter .en{
display:block; transform:skewX(18deg);
font-family:var(--en); font-weight:600; font-size:10px;
letter-spacing:6px; color:rgba(255,255,255,.7);
padding-bottom:12px; margin-top:-10px;
}
.tapline{
margin-top:22px;
font-family:var(--en); font-size:10px; letter-spacing:4px;
color:var(--gray); text-transform:uppercase;
animation:blink 1.6s ease-in-out infinite;
opacity:0; animation:rise .5s .9s forwards, blink 1.6s 1.5s ease-in-out infinite;
}
@keyframes blink{ 0%,100%{opacity:.9} 50%{opacity:.25} }
@keyframes rise{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
.flash{ position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0; background:var(--red); }
body.launching .flash{ animation:redzap .7s steps(3) infinite; }
@keyframes redzap{ 0%{opacity:0} 30%{opacity:.85} 50%{opacity:.1} 80%{opacity:.95} 100%{opacity:0} }
body.launching .stage{ animation:tear .4s steps(4); }
@keyframes tear{
0%{ transform:translate(0) }
25%{ transform:translate(-8px, 3px) skewX(3deg) }
50%{ transform:translate(6px, -2px) skewX(-2deg) }
75%{ transform:translate(-4px, 1px) }
100%{ transform:translate(0) }
}
@media (max-width:480px){
.title{ letter-spacing:8px; margin-right:-8px; }
.enter .lab{ padding:16px 44px; font-size:19px; }
.hud{ font-size:8px; }
.hud.bl, .hud.br{ display:none; }
}
@media (prefers-reduced-motion:reduce){
*{ animation-duration:.01s !important; animation-iteration-count:1 !important; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="slash"></div>
<div class="slash s2"></div>
<div class="sweep"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div class="hud tl"><b>WINZ</b> TECHNOLOGY</div>
<div class="hud tr">SYS.PUNCH <b>v2026</b></div>
<div class="hud bl">GPS FENCE <b>150M</b> // SERVER TIME SYNC</div>
<div class="hud br" id="hudClock">--:--:--</div>
<div class="stage" id="stage">
<img class="logo" alt="穎利科技 WINZ"
src="logo.png"
onerror="this.style.display='none'">
<div class="brand">WINZ <b>//</b> ERP SUITE</div>
<h1 class="title"><span class="t" data-txt="打卡系統">打卡系統</span></h1>
<div class="subtitle">Time Attendance System</div>
<div class="divider"></div>
<div class="bootlog" id="bootlog">
<div>&gt; AUTH MODULE ......... <span class="ok">READY</span></div>
<div>&gt; GPS FENCE 150M ...... <span class="ok">ARMED</span></div>
<div>&gt; SERVER TIME ......... <span class="ok">SYNCED</span></div>
</div>
<button class="enter" id="btnEnter">
<span class="lab">進入系統</span>
<span class="en">// PRESS TO ENTER //</span>
</button>
<div class="tapline">Tap anywhere to launch</div>
</div>
<div class="flash"></div>
<script>
  var TARGET_URL = 'https://script.google.com/a/macros/winz-tech.com/s/AKfycbxUDyY2BWgoYF4fbEOCBMnw-bmz-1KxogCpvtezgZboiuC9S04oHNnhkVPXb3Kg6Gp3/exec?page=punch';
  var EXEC_BASE  = 'https://script.google.com/a/macros/winz-tech.com/s/AKfycbxUDyY2BWgoYF4fbEOCBMnw-bmz-1KxogCpvtezgZboiuC9S04oHNnhkVPXb3Kg6Gp3/exec';
  // ═══ 第二刀：冷啟動讀 cookie → 後端驗證 → 無感進系統 ═══
  //   資安：cookie 只是鑰匙圈，放行與否永遠問後端 validate；token 被拔 → 當場清 cookie 踢登入
  (function(){
    function getCk(k){ try{ var m=document.cookie.match('(^|;)\\s*'+k+'\\s*=\\s*([^;]+)'); return m?decodeURIComponent(m.pop()):''; }catch(e){ return ''; } }
    function delCk(k){ try{ document.cookie = k+'=; max-age=0; path=/; SameSite=Lax'; }catch(e){} }
    var q = new URLSearchParams(location.search);
    if (q.get('logout') === '1') { delCk('WZ_TOKEN_CK'); delCk('WZ_NAME_CK'); return; }   // 登出回來：清 cookie 停在接待頁
    var tok = getCk('WZ_TOKEN_CK');
    if (!tok) return;                                    // 沒 cookie → 正常接待頁
    fetch(EXEC_BASE + '?page=validate&fresh=1&t=' + encodeURIComponent(tok))
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.ok && d.rc) {
          location.replace(EXEC_BASE + '?page=punch&rc=' + encodeURIComponent(d.rc));   // 無感進
        } else {
          delCk('WZ_TOKEN_CK'); delCk('WZ_NAME_CK');     // token 無效（離職/被踢）→ 清 cookie 留在登入頁
        }
      })
      .catch(function(){ /* 網路失敗 → 留在接待頁手動進，不擋人 */ });
  })();
// 右下角即時時鐘
function tick() {
var d = new Date();
var p = function(n){ return (n < 10 ? '0' : '') + n; };
document.getElementById('hudClock').textContent =
p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
}
tick(); setInterval(tick, 1000);
// 開機序列逐行浮現
(function(){
var rows = document.querySelectorAll('#bootlog div');
rows.forEach(function(r, i) {
setTimeout(function(){
r.style.transition = 'opacity .2s';
r.style.opacity = 1;
}, 900 + i * 280);
});
})();
// 啟動：音效 + glitch 撕裂 + 紅閃 → 跳轉
var sfx = new Audio('START.wav');
sfx.preload = 'auto';
var launched = false;
function launch() {
if (launched) return;
launched = true;
document.body.classList.add('launching');
var gone = false;
function goNow() {
if (gone) return;
gone = true;
window.location.href = TARGET_URL;
}
sfx.addEventListener('ended', goNow);          // 音效播完 → 跳轉
setTimeout(goNow, 3200);                        // 保險絲：最多等 3.2 秒
var p = null;
try { sfx.currentTime = 0; p = sfx.play(); } catch(e) {}
if (p && p.catch) p.catch(function(){ setTimeout(goNow, 800); }); // 播放失敗 → 照跳
}
document.addEventListener('click', launch);
document.addEventListener('keydown', launch);
document.addEventListener('touchend', launch, { passive: true });
document.addEventListener('touchstart', function(){ try{ sfx.load(); }catch(e){} }, { passive: true, once: true });
// ===== PWA Service Worker 註冊 =====
if ('serviceWorker' in navigator) {
window.addEventListener('load', function(){
navigator.serviceWorker.register('sw.js').then(function(reg){ reg.update(); })
.then(function(){ console.log('SW 已註冊'); })
.catch(function(e){ console.log('SW 註冊失敗', e); });
});
}
</script>
</body>
</html>
